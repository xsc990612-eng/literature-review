name: Python Tests

on:
  push:
    branches: [ main, master, dev ]
    paths:
      - 'code/ecommerce_analysis/**'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'code/ecommerce_analysis/**'
  workflow_dispatch:  # 允许手动触发

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
        cache-dependency-path: code/ecommerce_analysis/requirements.txt

    - name: Install dependencies
      working-directory: code/ecommerce_analysis
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Download NLTK data
      run: |
        python -c "import nltk; nltk.download('punkt'); nltk.download('stopwords'); nltk.download('wordnet'); nltk.download('averaged_perceptron_tagger')"

    - name: Run tests with pytest
      working-directory: code/ecommerce_analysis
      run: |
        pytest tests/ -v --tb=short --cov=. --cov-report=xml --cov-report=term

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        files: code/ecommerce_analysis/coverage.xml
        fail_ci_if_error: false
        verbose: true

  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install linting tools
      run: |
        python -m pip install --upgrade pip
        pip install flake8 black mypy

    - name: Lint with flake8
      working-directory: code/ecommerce_analysis
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Check formatting with black
      working-directory: code/ecommerce_analysis
      run: |
        black --check --diff . || true

    - name: Type check with mypy
      working-directory: code/ecommerce_analysis
      run: |
        mypy . --ignore-missing-imports || true
